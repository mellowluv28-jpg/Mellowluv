<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Mellowluv</title>
  <link rel="stylesheet" href="/public/css/style.css">
  <style>
    body { background: linear-gradient(135deg, #fef4f6, #fce4ec); }
    .login-section { min-height: 80vh; display: flex; align-items: center; justify-content: center; }
    .login-box {
      background: white;
      padding: 50px;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(232,160,180,0.12);
      width: 100%;
      max-width: 400px;
      border: 2px solid #f5d6de;
      animation: pop 0.5s ease;
    }
    .login-box h1 { text-align: center; font-size: 22px; margin-bottom: 4px; color: #5a4a4a; }
    .login-box h1 span { color: #e8a0b4; }
    .login-box .cat { text-align: center; font-size: 32px; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
    .login-box p { text-align: center; color: #b0878f; font-size: 13px; margin-bottom: 25px; }
    .login-box .form-group { margin-bottom: 18px; }
    .login-box .form-group label { font-size: 12px; color: #b0878f; }
    .login-box .btn-submit { width: 100%; }
    .error-msg { color: #d4808a; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
    @media (max-width: 768px) {
      .admin-layout { flex-direction: column; }
      .sidebar { width: 100%; min-height: auto; display: flex; gap: 5px; padding: 15px; overflow-x: auto; }
      .sidebar h3 { display: none; }
      .sidebar a { padding: 8px 12px; font-size: 12px; border-left: none; border-bottom: 2px solid transparent; white-space: nowrap; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo"><span class="cat-icon">🐱</span> Mellowluv</a>
      <ul class="nav-links"><li><a href="/">← Back to Store</a></li></ul>
    </div>
  </nav>

  <section class="login-section">
    <div class="login-box">
      <div class="cat">🐱</div>
      <h1>Admin <span>Panel</span></h1>
      <p>Sign in to manage your store 🌸</p>
      <form onsubmit="adminLogin(event)">
        <div class="form-group">
          <label>🌸 Username</label>
          <input type="text" id="username" autocomplete="off" required placeholder="Admin username">
        </div>
        <div class="form-group">
          <label>🔑 Password</label>
          <input type="password" id="password" autocomplete="off" required placeholder="Admin password">
        </div>
        <button type="submit" class="btn-submit">Sign In ✨</button>
        <div class="error-msg" id="login-error">Invalid credentials 💔</div>
      </form>
    </div>
  </section>

  <script>
    const existingToken = sessionStorage.getItem('admin_token');
    if (existingToken) {
      window.location.href = '/admin/dashboard.html';
    }

    async function adminLogin(event) {
      event.preventDefault();
      const btn = event.target.querySelector('.btn-submit');
      btn.textContent = 'Signing in...';
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        sessionStorage.setItem('admin_token', data.token);
        window.location.href = '/admin/dashboard.html';
      } else {
        document.getElementById('login-error').style.display = 'block';
        btn.textContent = 'Sign In ✨';
      }
    }
  </script>
</body>
</html>
